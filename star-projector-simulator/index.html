<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { STLExporter } from 'three/addons/exporters/STLExporter.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';
import * as BufferGeometryUtils from 'three/addons/utils/BufferGeometryUtils.js';
import GUI from 'lil-gui';

/* =========================================================================
   PHYSICAL / OPTICAL MODEL  (see README for the full derivation)
   - The iPhone LED is treated as a small point-ish source at the object base.
   - Each hole defines a DIRECTION from the LED; the star lands where that ray
     hits the ceiling. Magnification M = (ceiling height)/(hole height).
   - We compute star positions/size/brightness analytically (no GPU shadow
     casting) which is robust, fast and accurate enough for this device.
   ========================================================================= */

// ----- iPhone presets (APPROXIMATE — Apple publishes no beam/LED specs) -----
// offX/offZ: flash offset from phone centre (mm). led: emitter size (mm).
// beam: flood half-angle (deg). bright: relative torch brightness.
const PHONES = {
  'iPhone 14':      { offX: 25, offZ: 48, led: 1.4, beam: 63, bright: 0.95, w: 71.5, d: 146.7, t: 7.8 },
  'iPhone 15':      { offX: 26, offZ: 47, led: 1.5, beam: 62, bright: 1.00, w: 71.6, d: 147.6, t: 7.8 },
  'iPhone 15 Pro':  { offX: 27, offZ: 46, led: 1.6, beam: 60, bright: 1.10, w: 70.6, d: 146.6, t: 8.3 },
  'iPhone 16':      { offX: 26, offZ: 47, led: 1.5, beam: 62, bright: 1.05, w: 71.6, d: 147.6, t: 7.8 },
  'iPhone 16 Pro':  { offX: 27, offZ: 45, led: 1.7, beam: 58, bright: 1.15, w: 71.5, d: 149.6, t: 8.3 },
  'Custom':         null,
};

// ----------------------------- App state ----------------------------------
const params = {
  // Room (metres)
  roomW: 3.6, roomD: 3.6, roomH: 2.5, ambient: 0.07,
  // Phone
  phoneModel: 'iPhone 15',
  flashOffX: 26, flashOffZ: 47,   // mm, from phone centre
  ledSize: 1.5,                   // mm, effective emitter (die) size — drives penumbra/blur
  beam: 62,                       // deg, flood half-angle (FOV)
  brightness: 1.0,
  colorTemp: 4600,                // K, LED colour (warm white, like the reference)
  // Object (mm)
  objShape: 'Dome',
  objRadius: 30, objHeight: 40, wallThickness: 2.0, apertureSize: 3.5,
  objSegments: 120,
  // Star layout
  pattern: 'Scatter',
  count: 170, seed: 7, spread: 1.05,
  gradient: 0.0,                  // >0 = denser toward centre
  clusters: 6, clusterSize: 0.16,
  spiralArms: 2, spiralTurns: 1.4,
  bandAngle: 25, bandWidth: 0.16,
  rings: 5,
  brightnessVar: 0.45, sizeVar: 0.5,
  // Aperture shape mix (relative weights) — like the reference: mostly stars
  shapeStars: 68, shapeMoons: 12, shapeDots: 18, shapeSparkles: 2, rotateShapes: true,
  // Optics
  blur: 0.7,                      // multiplier on LED-size penumbra (edge softness)
  falloff: true, vignette: 0.6,   // inverse-sq + off-axis/incidence vignetting
  beamRolloff: 0.16,              // soft fade fraction at beam edge
  // Render
  exposure: 1.15, bloom: 0.6, starScale: 1.0, showRays: false, showCone: true, showHoles: true,
};

let SKIPPED = 0, REALIZED = 0;           // stats
let currentHoles = [];                   // realised holes {pLocal:Vector3(m), dir:Vector3}

// ----------------------------- Helpers ------------------------------------
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function gauss(rng){ let u=0,v=0; while(u===0)u=rng(); while(v===0)v=rng(); return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }
const ORIGIN = new THREE.Vector3(0,0,0);
const clamp=(x,a,b)=>Math.min(b,Math.max(a,x));
const smoothstep=(a,b,x)=>{ const t=clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); };

// Colour temperature (K) -> linear RGB (Tanner Helland approximation)
function kelvinToColor(kelvin){
  const t = clamp(kelvin,1000,12000)/100; let r,g,b;
  if(t<=66){ r=255; g=99.47*Math.log(t)-161.12; }
  else { r=329.7*Math.pow(t-60,-0.1332); g=288.12*Math.pow(t-60,-0.0755); }
  if(t>=66) b=255; else if(t<=19) b=0; else b=138.52*Math.log(t-10)-305.04;
  const c = new THREE.Color(clamp(r,0,255)/255, clamp(g,0,255)/255, clamp(b,0,255)/255);
  c.convertSRGBToLinear();
  return c;
}

// ----------------------------- Three setup --------------------------------
const app = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
app.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060a);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.01, 100);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.target.set(0, params.roomH*0.55, 0);

// Lights (dim — it's a dark room)
const ambient = new THREE.AmbientLight(0xffffff, params.ambient);
scene.add(ambient);
const fillTop = new THREE.HemisphereLight(0x223044, 0x000000, 0.12);
scene.add(fillTop);
const torch = new THREE.PointLight(0xffe6c0, 0.35, 2.0, 2.0); // glow inside the object
scene.add(torch);

// Post-processing (bloom for star glow)
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), params.bloom, 0.7, 0.0);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

// ----------------------------- Scene groups -------------------------------
let roomMesh, floorMesh, phoneGroup, flashMarker;
let objectGroup, objectShell, holeMarkers, coneMesh, raysGroup;
let starPoints, starMaterial;

const sceneRoot = new THREE.Group();
scene.add(sceneRoot);

/* ---- Aperture SHAPE atlas (2×2: star, moon, dot, sparkle) ------------------
   Each hole is cut as one of these shapes; the wall shows a magnified, softly
   feathered image of the shape — exactly the look in the reference photo. */
function drawStarShape(ctx, cx, cy, R, points, inner){
  ctx.beginPath();
  for(let i=0;i<points*2;i++){
    const rr=(i%2===0)?R:R*inner, a=-Math.PI/2 + i*Math.PI/points;
    const x=cx+Math.cos(a)*rr, y=cy+Math.sin(a)*rr;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath(); ctx.fill();
}
function makeShapeAtlas(){
  const S=256, cv=document.createElement('canvas'); cv.width=cv.height=S*2;
  const ctx=cv.getContext('2d'); ctx.fillStyle='#fff';
  const place=(col,row,fn)=>{ const cx=col*S+S/2, cy=row*S+S/2; fn(cx,cy,S*0.36); };
  place(0,0,(cx,cy,R)=>drawStarShape(ctx,cx,cy,R,5,0.42));              // 0 star
  place(1,0,(cx,cy,R)=>{                                                // 1 crescent moon
    ctx.save();
    ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath(); ctx.arc(cx+R*0.5, cy-R*0.12, R*0.9, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
  place(0,1,(cx,cy,R)=>{ ctx.beginPath(); ctx.arc(cx,cy,R*0.78,0,Math.PI*2); ctx.fill(); }); // 2 dot
  place(1,1,(cx,cy,R)=>drawStarShape(ctx,cx,cy,R,4,0.34));              // 3 sparkle
  // Soften edges so the penumbra feather has a gradient to work with.
  const out=document.createElement('canvas'); out.width=out.height=S*2;
  const o=out.getContext('2d'); o.filter='blur(4px)'; o.drawImage(cv,0,0);
  const tex=new THREE.CanvasTexture(out);
  tex.flipY=false; tex.generateMipmaps=false;
  tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter;
  tex.colorSpace=THREE.NoColorSpace;
  return tex;
}
const shapeAtlas = makeShapeAtlas();
function edgeFromBlur(){ return clamp(0.06 + params.blur*0.13, 0.03, 0.46); }

// Unit quad as an InstancedBufferGeometry seed (one decal per instance).
function makeQuadGeom(){
  const g=new THREE.InstancedBufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array([-0.5,-0.5,0, 0.5,-0.5,0, 0.5,0.5,0, -0.5,0.5,0]),3));
  g.setAttribute('uv', new THREE.BufferAttribute(new Float32Array([0,0, 1,0, 1,1, 0,1]),2));
  g.setIndex([0,1,2, 0,2,3]);
  return g;
}

// Decal material: each instance is a flat shape lying on the wall/ceiling.
function makeDecalMaterial(){
  return new THREE.ShaderMaterial({
    uniforms: { uAtlas:{value:shapeAtlas}, uExposure:{value:params.exposure}, uEdge:{value:edgeFromBlur()} },
    vertexShader: /* glsl */`
      attribute vec3 iCenter; attribute vec3 iAxisX; attribute vec3 iAxisY;
      attribute vec3 iColor;  attribute float iBright; attribute float iShape; attribute float iRot;
      varying vec2 vUv; varying vec3 vColor; varying float vBright;
      void main(){
        vec3 wp = iCenter + position.x*iAxisX + position.y*iAxisY;
        vec2 c = uv - 0.5;
        float cs=cos(iRot), sn=sin(iRot);
        vec2 rc = vec2(c.x*cs - c.y*sn, c.x*sn + c.y*cs);
        float col = mod(iShape, 2.0);
        float row = floor(iShape*0.5);
        vUv = vec2(col,row)*0.5 + (rc*0.9 + 0.5)*0.5;   // into the right atlas cell
        vColor=iColor; vBright=iBright;
        gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(wp, 1.0);
      }`,
    fragmentShader: /* glsl */`
      precision highp float;
      uniform sampler2D uAtlas; uniform float uExposure, uEdge;
      varying vec2 vUv; varying vec3 vColor; varying float vBright;
      void main(){
        float a = texture2D(uAtlas, vUv).a;
        a = smoothstep(0.5-uEdge, 0.5+uEdge, a);   // penumbra feather
        if(a <= 0.003) discard;
        gl_FragColor = vec4(vColor * a * vBright * uExposure, 1.0);
      }`,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false, depthTest: true,
    side: THREE.DoubleSide,
  });
}

/* =========================================================================
   OBJECT GEOMETRY (surface of revolution -> closed manifold shell)
   ========================================================================= */
// Outer profile points {r,z} in mm, base (z=0) up to the (truncated) top.
function outerProfile(){
  const R = params.objRadius, H = params.objHeight, steps = 56;
  const pts = [];
  for(let i=0;i<=steps;i++){
    const f = i/steps, z = H*f; let r;
    if(params.objShape==='Dome'){ r = R*Math.sqrt(Math.max(0,1-f*f)); }
    else if(params.objShape==='Cone'){ r = R*(1-f); }
    else { // Cylinder with domed cap over the top 25%
      const cap = 0.75;
      if(f < cap) r = R; else { const tt=(f-cap)/(1-cap); r = R*Math.sqrt(Math.max(0,1-tt*tt)); }
    }
    pts.push({ r, z });
  }
  // Truncate the tip so the revolved surface never touches the axis (keeps it
  // a clean manifold and gives a small flat top the zenith hole can sit on).
  const rMinTop = Math.max(params.wallThickness*1.25, 0.8);
  const out = pts.filter(p => p.r >= rMinTop);
  if(out.length < 2) out.push(pts[0], { r: rMinTop, z: pts[0].z + 1 });
  return out;
}

// Closed cross-section loop of the wall: outer up, flat top, inner down, base.
function shellLoop(){
  const o = outerProfile();
  const t = params.wallThickness;
  const loop = [];
  for(const p of o) loop.push({ r: p.r, z: p.z });                 // outer, base->top
  const top = o[o.length-1];
  for(let i=o.length-1;i>=0;i--){                                   // inner, top->base
    loop.push({ r: Math.max(o[i].r - t, 0.4), z: o[i].z });
  }
  return loop; // last point (inner base) -> first (outer base) closes via revolve wrap
}

// Revolve a CLOSED loop -> closed manifold BufferGeometry.
function revolveLoop(loop, segments){
  const P = loop.length, pos = [], idx = [];
  for(let j=0;j<segments;j++){
    const a = (j/segments)*Math.PI*2, ca=Math.cos(a), sa=Math.sin(a);
    for(let i=0;i<P;i++) pos.push(loop[i].r*ca, loop[i].z, loop[i].r*sa);
  }
  const at = (j,i)=> (j%segments)*P + i;
  for(let j=0;j<segments;j++) for(let i=0;i<P;i++){
    const i2=(i+1)%P, a=at(j,i), b=at(j,i2), c=at(j+1,i2), d=at(j+1,i);
    idx.push(a,b,d, b,c,d);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx);
  ensureOutward(g);
  g.computeVertexNormals();
  return g;
}

// Revolve an OPEN profile -> open strip (used for raycasting hole positions).
function revolveStrip(points, segments){
  const P = points.length, pos = [], idx = [];
  for(let j=0;j<=segments;j++){
    const a = (j/segments)*Math.PI*2, ca=Math.cos(a), sa=Math.sin(a);
    for(let i=0;i<P;i++) pos.push(points[i].r*ca, points[i].z, points[i].r*sa);
  }
  const at=(j,i)=> j*P+i;
  for(let j=0;j<segments;j++) for(let i=0;i<P-1;i++){
    const a=at(j,i), b=at(j,i+1), c=at(j+1,i+1), d=at(j+1,i);
    idx.push(a,b,d, b,c,d);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setIndex(idx); g.computeVertexNormals();
  return g;
}

// Flip winding if the mesh ended up inside-out (negative signed volume).
function ensureOutward(geom){
  const p = geom.attributes.position, index = geom.index.array; let vol=0;
  const a=new THREE.Vector3(), b=new THREE.Vector3(), c=new THREE.Vector3();
  for(let i=0;i<index.length;i+=3){
    a.fromBufferAttribute(p,index[i]); b.fromBufferAttribute(p,index[i+1]); c.fromBufferAttribute(p,index[i+2]);
    vol += a.dot(b.clone().cross(c))/6;
  }
  if(vol < 0) for(let i=0;i<index.length;i+=3){ const tmp=index[i+1]; index[i+1]=index[i+2]; index[i+2]=tmp; }
}

// Raycast helper: an outer-surface mesh in metres for projecting holes.
let outerRayMesh = null;
function rebuildOuterRayMesh(){
  if(outerRayMesh){ outerRayMesh.geometry.dispose(); }
  const o = outerProfile().map(p=>({ r:p.r/1000, z:p.z/1000 }));
  outerRayMesh = new THREE.Mesh(revolveStrip(o, params.objSegments),
                                new THREE.MeshBasicMaterial({ side: THREE.DoubleSide }));
  outerRayMesh.updateMatrixWorld(true); // raycast in LED-local space (base at origin)
}

/* =========================================================================
   SCENE BUILDERS
   ========================================================================= */
function flashWorld(){
  return new THREE.Vector3(params.flashOffX/1000, params.phoneT()/1000, params.flashOffZ/1000);
}
params.phoneT = () => (PHONES[params.phoneModel]?.t ?? 7.8);

function buildRoom(){
  if(roomMesh){ sceneRoot.remove(roomMesh); roomMesh.geometry.dispose(); }
  const g = new THREE.BoxGeometry(params.roomW, params.roomH, params.roomD);
  const m = new THREE.MeshStandardMaterial({ color: 0x10131c, roughness: 1, metalness: 0, side: THREE.BackSide });
  roomMesh = new THREE.Mesh(g, m);
  roomMesh.position.set(0, params.roomH/2, 0);
  sceneRoot.add(roomMesh);
  controls.target.set(0, params.roomH*0.55, 0);
}

function buildPhone(){
  if(phoneGroup){ sceneRoot.remove(phoneGroup); }
  phoneGroup = new THREE.Group();
  const spec = PHONES[params.phoneModel] || { w:71.6, d:147.6, t:7.8 };
  const w=spec.w/1000, d=spec.d/1000, t=spec.t/1000;
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(w, t, d),
    new THREE.MeshStandardMaterial({ color: 0x1b1e27, roughness:0.5, metalness:0.6 }));
  body.position.set(0, t/2, 0);
  phoneGroup.add(body);
  // flash marker (where the torch actually is)
  flashMarker = new THREE.Mesh(
    new THREE.CircleGeometry(0.004, 24),
    new THREE.MeshBasicMaterial({ color: 0xfff2d8 }));
  flashMarker.rotation.x = -Math.PI/2;
  flashMarker.position.set(params.flashOffX/1000, t+0.0005, params.flashOffZ/1000);
  phoneGroup.add(flashMarker);
  sceneRoot.add(phoneGroup);
}

function buildObject(){
  if(objectGroup){ sceneRoot.remove(objectGroup); }
  objectGroup = new THREE.Group();
  const f = flashWorld();
  objectGroup.position.copy(f).setY(params.phoneT()/1000);

  const loopM = shellLoop().map(p=>({ r:p.r/1000, z:p.z/1000 }));
  const geo = revolveLoop(loopM, params.objSegments);
  objectShell = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    color: 0x2a2f3c, roughness: 0.6, metalness: 0.1,
    transparent: true, opacity: 0.45, side: THREE.DoubleSide,
    emissive: 0x110b03, emissiveIntensity: 1.0,
  }));
  objectGroup.add(objectShell);
  sceneRoot.add(objectGroup);

  // beam cone visualisation
  if(coneMesh){ objectGroup.remove(coneMesh); }
  const ch = params.roomH - f.y;
  const rTop = ch * Math.tan(THREE.MathUtils.degToRad(params.beam));
  const cg = new THREE.ConeGeometry(rTop, ch, 48, 1, true);
  coneMesh = new THREE.Mesh(cg, new THREE.MeshBasicMaterial({
    color: 0xffe1a8, transparent: true, opacity: 0.05, side: THREE.DoubleSide, depthWrite:false }));
  coneMesh.rotation.x = Math.PI;          // apex at the LED, opening up at the ceiling
  coneMesh.position.set(0, ch/2, 0);
  coneMesh.visible = params.showCone;
  objectGroup.add(coneMesh);

  torch.position.copy(f).setY(params.phoneT()/1000 + 0.003);
  rebuildOuterRayMesh();
}

/* =========================================================================
   STAR LAYOUT (procedural / artistic) -> normalized unit-disk points
   ========================================================================= */
function generateLayout(){
  const rng = mulberry32(params.seed>>>0), n = params.count, pts = [];
  const push=(x,y)=>{ if(x*x+y*y<=1.02) pts.push({x,y}); };
  const cap = n*40; let tries=0;
  const pat = params.pattern;
  if(pat==='Clusters'){
    const K=Math.max(1,Math.round(params.clusters)), centers=[];
    for(let i=0;i<K;i++){ const r=Math.sqrt(rng())*0.8, a=rng()*2*Math.PI; centers.push([r*Math.cos(a),r*Math.sin(a)]); }
    while(pts.length<n && tries++<cap){ const c=centers[(rng()*K)|0]; push(c[0]+gauss(rng)*params.clusterSize, c[1]+gauss(rng)*params.clusterSize); }
  } else if(pat==='Spiral'){
    const arms=Math.max(1,Math.round(params.spiralArms));
    while(pts.length<n && tries++<cap){
      const tt=rng(), arm=(rng()*arms)|0;
      const ang=tt*params.spiralTurns*2*Math.PI + arm*2*Math.PI/arms;
      const jx=gauss(rng)*params.clusterSize*0.5, jy=gauss(rng)*params.clusterSize*0.5;
      push(tt*Math.cos(ang)+jx, tt*Math.sin(ang)+jy);
    }
  } else if(pat==='Milky Band'){
    const ang=THREE.MathUtils.degToRad(params.bandAngle), ca=Math.cos(ang), sa=Math.sin(ang);
    while(pts.length<n && tries++<cap){ const u=rng()*2-1, v=gauss(rng)*params.bandWidth; push(u*ca - v*sa, u*sa + v*ca); }
  } else if(pat==='Rings'){
    const rings=Math.max(1,Math.round(params.rings));
    while(pts.length<n && tries++<cap){ const ri=(rng()*rings)|0, r=(ri+1)/rings*0.95, a=rng()*2*Math.PI; push((r+gauss(rng)*0.015)*Math.cos(a),(r+gauss(rng)*0.015)*Math.sin(a)); }
  } else { // Scatter (with optional centre-weighted gradient)
    while(pts.length<n && tries++<cap){ const r=Math.pow(rng(), 0.5 + params.gradient), a=rng()*2*Math.PI; push(r*Math.cos(a), r*Math.sin(a)); }
  }
  return pts.map(p=>({ x:p.x, y:p.y,
    mag: 1 - params.brightnessVar*rng(),
    sz:  1 - params.sizeVar*rng() }));
}

/* =========================================================================
   PROJECTION + OPTICS  -> build the star Points + hole list
   ========================================================================= */
const raycaster = new THREE.Raycaster();
// Intersect a ray from the LED with the room interior (ceiling or walls).
function rayRoomHit(f, d){
  const hx=params.roomW/2, hz=params.roomD/2, H=params.roomH, e=1e-6;
  let best=Infinity, hit=null, normal=null;
  const test=(t, px,py,pz, nx,ny,nz, okA,okB)=>{
    if(t>e && t<best && okA && okB){ best=t; hit=new THREE.Vector3(px,py,pz); normal=new THREE.Vector3(nx,ny,nz); }
  };
  if(d.y> e){ const t=(H-f.y)/d.y, x=f.x+d.x*t, z=f.z+d.z*t; test(t,x,H,z, 0,-1,0, Math.abs(x)<=hx+e, Math.abs(z)<=hz+e); }
  if(d.x> e){ const t=(hx-f.x)/d.x, y=f.y+d.y*t, z=f.z+d.z*t; test(t,hx,y,z, -1,0,0, y>=0&&y<=H, Math.abs(z)<=hz+e); }
  if(d.x<-e){ const t=(-hx-f.x)/d.x, y=f.y+d.y*t, z=f.z+d.z*t; test(t,-hx,y,z, 1,0,0, y>=0&&y<=H, Math.abs(z)<=hz+e); }
  if(d.z> e){ const t=(hz-f.z)/d.z, y=f.y+d.y*t, x=f.x+d.x*t; test(t,x,y,hz, 0,0,-1, y>=0&&y<=H, Math.abs(x)<=hx+e); }
  if(d.z<-e){ const t=(-hz-f.z)/d.z, y=f.y+d.y*t, x=f.x+d.x*t; test(t,x,y,-hz, 0,0,1, y>=0&&y<=H, Math.abs(x)<=hx+e); }
  return hit ? { point:hit, dist:best, normal } : null;
}

function updateStars(){
  const layout = generateLayout();
  const f = flashWorld();
  const beamRad = THREE.MathUtils.degToRad(params.beam);
  const apM = params.apertureSize/1000, dLED = params.ledSize/1000;
  const baseColor = kelvinToColor(params.colorTemp);
  const rng = mulberry32((params.seed*2+1)>>>0);

  // aperture shape mix (relative weights) -> per-star shape index
  const W=[Math.max(0,params.shapeStars),Math.max(0,params.shapeMoons),Math.max(0,params.shapeDots),Math.max(0,params.shapeSparkles)];
  const Wsum=(W[0]+W[1]+W[2]+W[3])||1;
  const pickShape=(r)=>{ let a=r*Wsum; if((a-=W[0])<0)return 0; if((a-=W[1])<0)return 1; if((a-=W[2])<0)return 2; return 3; };
  const shapeSizeMul=[1.0, 1.15, 0.55, 0.8];   // star, moon, dot, sparkle

  currentHoles = []; SKIPPED = 0;
  const raw = [];
  const tmpA=new THREE.Vector3(), tmpB=new THREE.Vector3();

  for(const s of layout){
    // map the normalized layout point to a direction inside the beam cone
    const nr = Math.min(Math.hypot(s.x, s.y), 1.4);
    const phi = Math.atan2(s.y, s.x);
    const theta = nr * beamRad * params.spread;
    const st = Math.sin(theta), ct = Math.cos(theta);
    const dir = new THREE.Vector3(st*Math.cos(phi), ct, st*Math.sin(phi)).normalize();

    // beam cone limit (FOV) with soft edge rolloff
    const edge0 = beamRad*(1-params.beamRolloff);
    const beamF = 1 - smoothstep(edge0, beamRad, theta);
    if(beamF <= 0.004){ SKIPPED++; continue; }

    // hole on the object surface (outerRayMesh is in LED-local space)
    raycaster.set(ORIGIN, dir);
    const hit = raycaster.intersectObject(outerRayMesh, false)[0];
    if(!hit){ SKIPPED++; continue; }
    const rHole = hit.point.length();
    if(rHole <= 0.0008){ SKIPPED++; continue; }

    // where the beam lands in the room (ceiling or a wall)
    const room = rayRoomHit(f, dir);
    if(!room){ SKIPPED++; continue; }
    const n = room.normal, dist = room.dist;
    const M = dist / rHole;                                 // magnification
    const cosInc = Math.abs(dir.dot(n));                    // 1 = head-on

    const shp = pickShape(rng());
    const rot = params.rotateShapes ? rng()*Math.PI*2 : 0;

    // projected shape size (m): magnified aperture + LED penumbra
    const core = M * apM * shapeSizeMul[shp];
    const penumbra = M * dLED * params.blur;
    const diam = Math.max((core + penumbra) * (0.7 + 0.6*s.sz) * params.starScale, 0.012);
    const half = diam * 0.5;
    const stretch = 1 / clamp(cosInc, 0.28, 1);            // elongate at grazing incidence

    // in-plane basis: A along the incidence direction (stretch axis), B = n × A
    let A = tmpA.copy(dir).addScaledVector(n, -dir.dot(n));
    if(A.lengthSq() < 1e-8){ A.set(Math.abs(n.y)<0.9?0:1, Math.abs(n.y)<0.9?1:0, 0).addScaledVector(n, -tmpA.dot(n)); }
    A.normalize();
    const B = tmpB.crossVectors(n, A).normalize();
    const axisX = A.clone().multiplyScalar(half*stretch);
    const axisY = B.clone().multiplyScalar(half);

    // brightness: inverse-square + off-axis/incidence vignette, gated by beam
    let b = 1.0;
    if(params.falloff){ b *= 1.0/(dist*dist); b *= THREE.MathUtils.lerp(1.0, Math.pow(ct,3)*cosInc, params.vignette); }
    b *= beamF * s.mag * params.brightness;

    // gentle per-star colour variation
    const col = baseColor.clone(); const hsl={}; col.getHSL(hsl);
    col.setHSL((hsl.h + (rng()-0.5)*0.05 + 1)%1, clamp(hsl.s + (rng()-0.5)*0.08,0,1), hsl.l);

    const p = room.point.clone().addScaledVector(n, 0.006); // off-surface to avoid z-fighting
    raw.push({ p, axisX, axisY, b, col, shp, rot });
    currentHoles.push({ pLocal: hit.point.clone(), dir: dir.clone(), world: room.point.clone(), shape: shp });
  }

  // normalise brightness so the brightest decal ≈ 1, then pack instance buffers
  let maxB = 1e-6; for(const r of raw) maxB = Math.max(maxB, r.b);
  const N = raw.length; REALIZED = N;
  const iC=new Float32Array(N*3), iX=new Float32Array(N*3), iY=new Float32Array(N*3), iCol=new Float32Array(N*3);
  const iB=new Float32Array(N), iS=new Float32Array(N), iR=new Float32Array(N);
  for(let k=0;k<N;k++){
    const r=raw[k];
    iC.set([r.p.x,r.p.y,r.p.z], k*3);
    iX.set([r.axisX.x,r.axisX.y,r.axisX.z], k*3);
    iY.set([r.axisY.x,r.axisY.y,r.axisY.z], k*3);
    iCol.set([r.col.r,r.col.g,r.col.b], k*3);
    iB[k]=Math.pow(r.b/maxB, 0.8)*1.25; iS[k]=r.shp; iR[k]=r.rot;
  }

  // (re)build the instanced decal mesh
  if(starPoints){ sceneRoot.remove(starPoints); starPoints.geometry.dispose(); }
  const g = makeQuadGeom();
  g.setAttribute('iCenter', new THREE.InstancedBufferAttribute(iC,3));
  g.setAttribute('iAxisX',  new THREE.InstancedBufferAttribute(iX,3));
  g.setAttribute('iAxisY',  new THREE.InstancedBufferAttribute(iY,3));
  g.setAttribute('iColor',  new THREE.InstancedBufferAttribute(iCol,3));
  g.setAttribute('iBright', new THREE.InstancedBufferAttribute(iB,1));
  g.setAttribute('iShape',  new THREE.InstancedBufferAttribute(iS,1));
  g.setAttribute('iRot',    new THREE.InstancedBufferAttribute(iR,1));
  g.instanceCount = N;
  if(!starMaterial) starMaterial = makeDecalMaterial();
  starPoints = new THREE.Mesh(g, starMaterial);
  starPoints.frustumCulled = false;
  sceneRoot.add(starPoints);

  buildHoleMarkers();
  buildRays(f);
  updateStats();
}

function buildHoleMarkers(){
  if(holeMarkers){ objectGroup.remove(holeMarkers); holeMarkers.geometry.dispose(); holeMarkers.dispose?.(); }
  const n = currentHoles.length;
  const geo = new THREE.SphereGeometry(0.0014, 6, 4);
  holeMarkers = new THREE.InstancedMesh(geo, new THREE.MeshBasicMaterial({ color: 0xffce7a }), Math.max(1,n));
  const m = new THREE.Matrix4();
  for(let i=0;i<n;i++){ m.setPosition(currentHoles[i].pLocal); holeMarkers.setMatrixAt(i,m); }
  holeMarkers.count = n;
  holeMarkers.instanceMatrix.needsUpdate = true;
  holeMarkers.visible = params.showHoles;
  objectGroup.add(holeMarkers);
}

function buildRays(f){
  if(raysGroup){ raysGroup.traverse(o=>o.geometry?.dispose()); sceneRoot.remove(raysGroup); }
  raysGroup = new THREE.Group();
  raysGroup.visible = params.showRays;
  const mat = new THREE.LineBasicMaterial({ color: 0xffd9a0, transparent:true, opacity:0.16 });
  const step = Math.max(1, Math.floor(currentHoles.length/16));
  for(let i=0;i<currentHoles.length;i+=step){
    const g = new THREE.BufferGeometry().setFromPoints([f, currentHoles[i].world]);
    raysGroup.add(new THREE.Line(g, mat));
  }
  sceneRoot.add(raysGroup);
}

/* =========================================================================
   STL EXPORT (real printable model — shaped holes punched via CSG)
   ========================================================================= */
const APERTURE_SIZEMUL = [1.0, 1.15, 0.55, 0.8];   // star, moon, dot, sparkle
function starShape2D(R, points, inner){
  const s=new THREE.Shape();
  for(let i=0;i<points*2;i++){ const rr=(i%2===0)?R:R*inner, a=-Math.PI/2+i*Math.PI/points; const x=Math.cos(a)*rr, y=Math.sin(a)*rr; i===0?s.moveTo(x,y):s.lineTo(x,y); }
  s.closePath(); return s;
}
function crescentShape2D(R){
  const rc=0.9*R, cx=0.5*R, d=cx;
  const a=(d*d - rc*rc + R*R)/(2*d), h=Math.sqrt(Math.max(0, R*R - a*a));
  if(!(h>1e-4)){ const c=new THREE.Shape(); c.absarc(0,0,R,0,Math.PI*2,false); return c; }
  const thU=Math.atan2(h,a), N=40, s=new THREE.Shape();
  for(let i=0;i<=N;i++){ const t=thU + (2*Math.PI-2*thU)*i/N; const x=R*Math.cos(t), y=R*Math.sin(t); i===0?s.moveTo(x,y):s.lineTo(x,y); } // outer rim (long way)
  const fL=Math.atan2(-h, a-cx), fU2=Math.atan2(h, a-cx)-2*Math.PI;          // inner bite (through leftmost)
  for(let i=0;i<=N;i++){ const t=fL + (fU2-fL)*i/N; s.lineTo(cx+rc*Math.cos(t), rc*Math.sin(t)); }
  s.closePath(); return s;
}
function apertureShape2D(shp, R){
  if(shp===0) return starShape2D(R, 5, 0.42);   // star
  if(shp===3) return starShape2D(R, 4, 0.34);   // sparkle
  return crescentShape2D(R);                     // moon
}
// One solid cutter prism (mm), oriented along the hole's ray direction.
function buildCutter(h, span){
  const R = (params.apertureSize/2) * APERTURE_SIZEMUL[h.shape];
  let geo, axis;
  if(h.shape===2){                                // dot -> cylinder
    geo = new THREE.CylinderGeometry(R, R, span, 20, 1); axis = new THREE.Vector3(0,1,0);
  } else {                                         // star/moon/sparkle -> extruded prism
    let shp2d; try { shp2d = apertureShape2D(h.shape, R); } catch(e){ const c=new THREE.Shape(); c.absarc(0,0,R,0,Math.PI*2,false); shp2d=c; }
    geo = new THREE.ExtrudeGeometry(shp2d, { depth: span, bevelEnabled:false, steps:1 });
    geo.translate(0,0,-span/2); axis = new THREE.Vector3(0,0,1);
  }
  const q = new THREE.Quaternion().setFromUnitVectors(axis, h.dir);
  geo.applyMatrix4(new THREE.Matrix4().compose(h.pLocal.clone().multiplyScalar(1000), q, new THREE.Vector3(1,1,1)));
  if(!geo.attributes.uv) geo.setAttribute('uv', new THREE.Float32BufferAttribute(new Float32Array(geo.attributes.position.count*2),2));
  return geo;
}

async function exportSTL(){
  if(currentHoles.length === 0){ toast('No realisable holes — widen the object or beam first.'); return; }
  toast('Building STL… (CSG can take a few seconds)');
  await new Promise(r=>setTimeout(r,30));
  try{
    // base shell in mm (give it a uv attribute so it matches the cylinders'
    // attribute set — three-bvh-csg interpolates attributes across both brushes)
    const base = revolveLoop(shellLoop(), params.objSegments);
    base.setAttribute('uv', new THREE.Float32BufferAttribute(new Float32Array(base.attributes.position.count*2), 2));
    // shaped hole cutters in mm, aligned to each ray direction
    const span = Math.max(params.wallThickness*6, 8);
    const cap = 200;
    const holes = currentHoles.slice(0, cap);
    const cutters = holes.map(h => buildCutter(h, span));
    const merged = BufferGeometryUtils.mergeGeometries(cutters, false);

    const { Brush, Evaluator, SUBTRACTION } = await import('three-bvh-csg');
    const ev = new Evaluator(); ev.useGroups = false;
    const result = ev.evaluate(new Brush(base), new Brush(merged), SUBTRACTION);

    const stl = new STLExporter().parse(new THREE.Mesh(result.geometry), { binary: true });
    download(new Blob([stl], { type: 'application/octet-stream' }), `star-projector_${params.objShape}_${holes.length}holes.stl`);
    const note = currentHoles.length > cap ? ` (capped at ${cap}/${currentHoles.length})` : '';
    toast(`STL exported · ${holes.length} holes · Ø${(params.objRadius*2).toFixed(0)}×${params.objHeight.toFixed(0)} mm${note}`);
  }catch(err){
    console.error(err);
    toast('STL export failed — see console. (CSG library may be unavailable offline.)');
  }
}

// ----------------------------- Save / load / capture ----------------------
function download(blob, name){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u); }
function saveSettings(){
  const out={}; for(const k in params) if(typeof params[k]!=='function') out[k]=params[k];
  download(new Blob([JSON.stringify(out,null,2)],{type:'application/json'}), 'star-projector-settings.json');
}
function loadSettings(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='application/json';
  inp.onchange=()=>{ const fr=new FileReader(); fr.onload=()=>{ try{ Object.assign(params, JSON.parse(fr.result)); refreshAll(); gui.controllersRecursive().forEach(c=>c.updateDisplay()); toast('Settings loaded'); }catch(e){ toast('Bad settings file'); } }; fr.readAsText(inp.files[0]); };
  inp.click();
}
function screenshot(){ composer.render(); download(dataURLtoBlob(renderer.domElement.toDataURL('image/png')), 'star-projector.png'); toast('Screenshot saved'); }
function dataURLtoBlob(u){ const b=atob(u.split(',')[1]), a=new Uint8Array(b.length); for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i); return new Blob([a],{type:'image/png'}); }

// ----------------------------- Refresh orchestration ----------------------
function refreshScene(){ buildRoom(); buildPhone(); buildObject(); }
function refreshAll(){ ambient.intensity=params.ambient; torch.intensity=0.35*params.brightness; renderer.toneMappingExposure=1.0; refreshScene(); updateStars(); applyUniforms(); }
function applyUniforms(){
  if(!starMaterial) return;
  starMaterial.uniforms.uExposure.value = params.exposure;
  starMaterial.uniforms.uEdge.value = edgeFromBlur();
  bloomPass.strength = params.bloom;
}

function updateStats(){
  const el=document.getElementById('stats');
  const warn = SKIPPED > params.count*0.25
    ? `<span class="warn"> · ${SKIPPED} unrealisable (object too small for the beam)</span>` : '';
  el.innerHTML = `<b>${REALIZED}</b> shapes projected · beam ±<b>${params.beam.toFixed(0)}°</b> · aperture ${params.apertureSize.toFixed(1)} mm${warn}`;
}

}
document.getElementById('btn-room').onclick   = ()=>setView('room');
document.getElementById('btn-lookup').onclick = ()=>setView('lookup');
document.getElementById('btn-side').onclick   = ()=>setView('side');

// ----------------------------- Toast --------------------------------------
let toastTimer=null;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),3200); }

// ----------------------------- Boot + loop --------------------------------
refreshAll();
setView('room');

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(()=>{
  controls.update();
  composer.render();
});

// expose for debugging
window.__sp = { params, updateStars, refreshAll, exportSTL };
</script>
