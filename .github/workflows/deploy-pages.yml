name: Deploy star projector simulator to Pages

on:
  push:
    branches: [ "claude/star-projector-simulator-fnx2ir" ]
  workflow_dispatch:

# Permissions needed for the GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (auto-enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Serve the simulator folder at the Pages root so the URL is just
      # https://<user>.github.io/<repo>/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: star-projector-simulator

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
